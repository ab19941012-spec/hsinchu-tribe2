<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新竹縣部落建設進度報告 | MUJI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --muji-bg: #F4F4F1;
            --muji-text: #333333;
            --muji-gray: #7F7F7F;
            --muji-red: #BC2121; /* MUJI 標誌紅，僅用於點綴 */
            --muji-border: #E0E0E0;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--muji-bg);
            color: var(--muji-text);
            line-height: 1.8;
            letter-spacing: 0.02em;
        }
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        .muji-card {
            background: white;
            border: 1px solid var(--muji-border);
            transition: border 0.3s ease;
        }
        .muji-card:hover {
            border: 1px solid var(--muji-gray);
        }
        /* 隱藏滾動條 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--muji-bg); }
        ::-webkit-scrollbar-thumb { background: var(--muji-gray); }
    </style>
</head>
<body x-data="mujiApp()">

    <!-- Header -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <span class="text-sm font-medium tracking-widest text-gray-500 uppercase">Hsinchu Tribe Progress</span>
            <span class="text-[10px] text-gray-400 font-light" x-text="today"></span>
        </div>
    </nav>

    <!-- Hero -->
    <header class="pt-32 pb-20 px-6 max-w-5xl mx-auto">
        <div class="reveal">
            <h1 class="text-3xl md:text-4xl font-light text-gray-800 mb-4">部落建設工程進度</h1>
            <p class="text-sm text-gray-500 font-light max-w-md leading-loose">
                此報告彙整新竹縣 25 項原住民族部落建設。我們以誠實、透明的態度，呈現每一項工程的現況與未來計畫。
            </p>
        </div>
    </header>

    <!-- Filters -->
    <div class="max-w-5xl mx-auto px-6 mb-12 flex space-x-8 text-xs font-medium border-b border-gray-200 overflow-x-auto pb-4 no-scrollbar">
        <template x-for="cat in categories">
            <button @click="filter = cat.id" 
                    class="whitespace-nowrap pb-2 transition-colors relative"
                    :class="filter === cat.id ? 'text-black' : 'text-gray-400 hover:text-gray-600'">
                <span x-text="cat.name"></span>
                <div x-show="filter === cat.id" class="absolute bottom-0 left-0 w-full h-[1px] bg-red-800"></div>
            </button>
        </template>
    </div>

    <!-- Project List -->
    <main class="max-w-5xl mx-auto px-6 pb-40">
        <div class="grid grid-cols-1 gap-12">
            <template x-for="(item, index) in filteredProjects" :key="item.id">
                <div class="reveal muji-card p-8 md:p-12 relative overflow-hidden">
                    <!-- Status Label -->
                    <div class="absolute top-0 right-0 px-4 py-1 text-[10px] font-medium border-l border-b border-gray-100 text-gray-400 tracking-tighter" x-text="'ID: ' + item.id"></div>

                    <div class="flex flex-col md:flex-row md:items-start gap-8">
                        <!-- Year & Basic Info -->
                        <div class="w-full md:w-1/4">
                            <div class="text-[10px] text-red-800 font-bold mb-2 tracking-widest" x-text="item.year + ' 年度'"></div>
                            <h2 class="text-xl font-medium mb-4 text-gray-800" x-text="item.name"></h2>
                            <div class="text-[11px] text-gray-500 space-y-1 font-light">
                                <p x-text="'性質：' + item.type"></p>
                                <p x-text="'承辦人：' + item.owner"></p>
                            </div>
                        </div>

                        <!-- Content Info -->
                        <div class="w-full md:w-2/4">
                            <div class="mb-6">
                                <span class="text-[10px] uppercase text-gray-400 tracking-widest block mb-2">最新進度概述</span>
                                <p class="text-sm text-gray-600 font-light leading-relaxed" x-text="item.note"></p>
                            </div>
                            <div class="grid grid-cols-2 gap-4 border-t border-gray-50 pt-4">
                                <div>
                                    <span class="text-[10px] text-gray-400 block uppercase tracking-tighter">目前里程碑</span>
                                    <span class="text-xs font-medium text-gray-700" x-text="item.milestone"></span>
                                </div>
                                <div>
                                    <span class="text-[10px] text-gray-400 block uppercase tracking-tighter">核定日期</span>
                                    <span class="text-xs font-medium text-gray-700" x-text="item.date"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Budget Info -->
                        <div class="w-full md:w-1/4 bg-gray-50 p-6">
                            <span class="text-[10px] text-gray-400 block uppercase mb-4 tracking-widest">經費細項 (元)</span>
                            <div class="space-y-3">
                                <div class="flex justify-between items-baseline">
                                    <span class="text-[10px] text-gray-500">總額</span>
                                    <span class="text-sm font-medium" x-text="item.total.toLocaleString()"></span>
                                </div>
                                <div class="flex justify-between items-baseline border-t border-gray-200 pt-2">
                                    <span class="text-[9px] text-gray-400">原民會補助</span>
                                    <span class="text-[11px] text-gray-600" x-text="item.subsidy.toLocaleString()"></span>
                                </div>
                                <div class="flex justify-between items-baseline">
                                    <span class="text-[9px] text-gray-400">地方配合款</span>
                                    <span class="text-[11px] text-gray-600" x-text="item.match.toLocaleString()"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-20 px-6 text-center">
        <p class="text-[10px] text-gray-400 tracking-[0.3em] uppercase">Muji style Progress Monitoring</p>
        <p class="text-[10px] text-gray-300 mt-2 font-light tracking-widest">無印良品風 · 簡約透明 · 實踐未來</p>
    </footer>

                init() {
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) entry.target.classList.add('active');
                        });
                    }, { threshold: 0.1 });

                    this.$watch('filter', () => {
                        setTimeout(() => {
                            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                        }, 100);
                    });

                        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                    }, 200);
