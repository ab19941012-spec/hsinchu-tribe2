<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新竹縣原鄉地區部落建設</title>
    <!-- Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --apple-bg: #000000;
            --apple-card: #1c1c1e;
            --apple-text: #f5f5f7;
            --apple-gray: #86868b;
            --apple-blue: #0071e3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang TC", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            -webkit-font-smoothing: antialiased;
        }
        /* 標題漸層效果 */
        .text-gradient {
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* 官網風格卡片 */
        .apple-card {
            background-color: var(--apple-card);
            border-radius: 24px;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }
        .apple-card:hover {
            background-color: #2c2c2e;
            transform: scale(1.02);
        }
        /* 滑動浮現動畫 */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="appleApp()">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-6xl mx-auto px-6 h-12 flex items-center justify-between">

            <div class="hidden md:flex space-x-8 text-[12px] text-gray-400">
                <template x-for="cat in categories">
                    <button @click="filter = cat.id" 
                            class="hover:text-white transition"
                            :class="filter === cat.id ? 'text-white' : ''"
                            x-text="cat.name"></button>
                </template>
            </div>
            <div class="md:hidden text-[12px] text-blue-500 font-medium">篩選項目</div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="pt-48 pb-32 px-6 text-center">
        <div class="reveal">
            <h1 class="text-5xl md:text-8xl font-bold tracking-tight text-gradient mb-8 leading-tight">
                新竹縣原鄉地區<br>部落建設
            </h1>
            <p class="text-xl md:text-2xl text-gray-400 font-medium max-w-3xl mx-auto">
                卓越設計。深耕部落。串聯未來。
            </p>
        </div>
    </header>

    <!-- Mobile Scroller (僅手機顯示) -->
    <div class="md:hidden flex space-x-4 overflow-x-auto no-scrollbar px-6 mb-12">
        <template x-for="cat in categories">
            <button @click="filter = cat.id" 
                    :class="filter === cat.id ? 'bg-white text-black' : 'bg-white/10 text-white'"
                    class="px-5 py-2 rounded-full text-[13px] font-medium whitespace-nowrap transition"
                    x-text="cat.name"></button>
        </template>
    </div>

    <!-- Project Bento Grid -->
    <main class="max-w-7xl mx-auto px-6 pb-48">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="item in filteredProjects" :key="item.id">
                <div class="reveal apple-card p-8 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-[11px] font-bold uppercase tracking-widest text-blue-500" x-text="item.year + ' 年度'"></span>
                            <span class="text-[11px] text-gray-500 font-mono" x-text="'#' + String(item.id).padStart(3, '0')"></span>
                        </div>
                        
                        <h2 class="text-xl font-semibold leading-tight mb-4 pr-4" x-text="item.name"></h2>
                        
                        <div class="space-y-6">
                            <!-- Milestone Widget -->
                            <div class="bg-black/20 rounded-2xl p-4">
                                <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest block mb-1">目前進展</span>
                                <p class="text-[14px] text-gray-200" x-text="item.milestone"></p>
                            </div>
                            
                            <!-- Note Section -->
                            <div>
                                <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest block mb-2">最新進度概述</span>
                                <p class="text-[13px] text-gray-400 leading-relaxed font-light" x-text="item.note"></p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-10 pt-6 border-t border-white/5">
                        <div class="flex justify-between items-end mb-4">
                            <div>
                                <span class="text-[10px] text-gray-500 block mb-1">總預算 (TWD)</span>
                                <span class="text-xl font-medium" x-text="item.total === 0 ? '陳情提案' : '$' + item.total.toLocaleString()"></span>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] text-gray-500 block mb-1">承辦人員</span>
                                <span class="text-[12px] text-gray-300" x-text="item.owner"></span>
                            </div>
                        </div>
                        <!-- Info Badges -->
                        <div class="flex flex-wrap gap-2">
                            <span class="text-[10px] bg-white/5 px-2 py-1 rounded text-gray-500" x-text="item.subsidyLabel"></span>
                            <span class="text-[10px] bg-white/5 px-2 py-1 rounded text-gray-500" x-text="item.matchLabel"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-32 border-t border-white/10 text-center">
        <p class="text-gray-500 text-[13px] font-medium mb-2">新竹縣政府原住民族行政處</p>
        <p class="text-gray-600 text-[11px] tracking-tight">© 2025 部落建設數據中心。數據實時更新。</p>
