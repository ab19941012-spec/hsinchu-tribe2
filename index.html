    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang TC", sans-serif;
            background-color: #000; color: #f5f5f7; -webkit-font-smoothing: antialiased;
        }
        .text-gradient {
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .apple-card {
            background-color: #1c1c1e; border-radius: 20px; transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1);
        }
        .reveal { opacity: 0; transform: translateY(15px); transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .budget-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .stat-badge { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
    </style>
</head>
<body x-data="appleApp()">

    <!-- Nav (手機頂部滾動) -->
    <nav class="fixed top-0 w-full z-50 bg-black/95 backdrop-blur-xl border-b border-white/10">

    <!-- Hero & Stats Dashboard -->

            <p class="text-[15px] text-gray-400 font-medium tracking-widest uppercase mb-6">案件彙整資訊平台</p>

                    <span class="text-[11px] text-gray-500 uppercase font-bold block mb-1">案件數量</span>
                    <span class="text-2xl font-bold text-blue-500" x-text="filteredProjects.length + ' 件'"></span>
                </div>
                <div class="stat-badge px-6 py-4 flex-1 max-w-[240px]">
                    <span class="text-[11px] text-gray-500 uppercase font-bold block mb-1">經費合計</span>
                    <span class="text-xl font-bold text-white font-mono" x-text="formatTotalBudget()"></span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-5 pb-24">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="item in filteredProjects" :key="item.id">
                <div class="reveal apple-card p-6 flex flex-col h-full shadow-2xl">
                    <div class="flex-grow">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[12px] font-black text-blue-500 uppercase tracking-widest" x-text="item.year + ' 年度'"></span>
                            <span class="text-[11px] text-gray-500 font-mono" x-text="'ID: PRJ-' + String(item.id).padStart(3, '0')"></span>
                        </div>
                        <h2 class="text-[22px] font-bold leading-tight mb-5" x-text="item.name"></h2>
                        
                        <div class="mb-6 space-y-4">
                            <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                                <span class="text-[11px] text-gray-500 font-bold uppercase block mb-1">目前里程碑</span>
                                <p class="text-[17px] text-white font-semibold leading-tight" x-text="item.milestone"></p>
                            </div>
                            <div>
                                <span class="text-[11px] text-gray-500 font-bold uppercase block mb-1">最新進度概述</span>
                                <p class="text-[16px] text-gray-400 leading-relaxed font-normal" x-text="item.note"></p>
                            </div>
                        </div>

                        <!-- 財務清單 -->
                        <div class="bg-black/40 rounded-2xl p-5 border border-white/5 mb-6">
                            <div class="budget-row"><span class="text-[15px] text-gray-400">總經費</span><span class="text-[17px] font-bold font-mono text-white" x-text="item.total > 0 ? '$' + item.total.toLocaleString() : '未定'"></span></div>
                            <div class="budget-row"><span class="text-[14px] text-gray-400" x-text="item.subsidyLabel"></span><span class="text-[15px] font-mono text-gray-200" x-text="item.subsidy > 0 ? '$' + item.subsidy.toLocaleString() : '未定'"></span></div>
                            <div class="budget-row border-none pb-0"><span class="text-[14px] text-gray-400">地方配合款</span><span class="text-[15px] font-mono text-gray-200" x-text="item.match > 0 ? '$' + item.match.toLocaleString() : '未定'"></span></div>
                        </div>
                    </div>
                    <div class="mt-auto pt-4 border-t border-white/5 flex justify-between items-end">
                        <div><span class="text-[11px] text-gray-600 font-bold block uppercase mb-1">負責人員</span><span class="text-[15px] text-gray-300 font-medium" x-text="item.owner"></span></div>
                        <div class="text-right"><span class="text-[11px] text-gray-600 font-bold block uppercase mb-1">核定日期</span><span class="text-[15px] text-gray-400 font-mono" x-text="item.date"></span></div>
                    </div>
                </div>
            </template>
        </div>
