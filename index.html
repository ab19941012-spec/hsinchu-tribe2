<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新竹縣原鄉地區部落建設 | 案件彙整資訊平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang TC", sans-serif;
            background-color: #000;
            color: #f5f5f7;
            -webkit-font-smoothing: antialiased;
        }
        .text-gradient {
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .apple-card {
            background-color: #1c1c1e;
            border-radius: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .budget-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>

    <!-- Hero -->

    </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="item in filteredProjects" :key="item.id">

                    <div class="flex-grow">
                        <!-- Header -->
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[11px] font-black text-blue-500 uppercase tracking-[0.15em]" x-text="item.year + ' 年度'"></span>
                            <span class="text-[11px] text-gray-500 font-mono" x-text="'ID: ' + String(item.id).padStart(3, '0')"></span>
                        </div>
                        
                        <!-- Project Name (放大) -->
                        <h2 class="text-[20px] font-bold leading-tight mb-5" x-text="item.name"></h2>
                        
                        <!-- Progress & Note (放大) -->
                        <div class="mb-6 space-y-4">
                            <div class="bg-white/5 rounded-2xl p-4 border border-white/5 shadow-inner">
                                <span class="text-[10px] text-gray-500 font-bold uppercase block mb-1 tracking-widest">目前里程碑</span>
                                <p class="text-[15px] text-gray-100 font-semibold leading-snug" x-text="item.milestone"></p>
                            </div>
                            <div>
                                <span class="text-[10px] text-gray-500 font-bold uppercase block mb-1 tracking-widest">最新進度概述</span>
                                <p class="text-[15px] text-gray-400 leading-relaxed font-normal" x-text="item.note"></p>
                            </div>
                        </div>

                        <!-- Budget Details (表格化) -->
                        <div class="bg-black/40 rounded-2xl p-5 border border-white/5 mb-6">
                            <div class="budget-row">
                                <span class="text-[13px] text-gray-400">總經費</span>
                                <span class="text-[15px] font-bold font-mono text-white" x-text="item.total > 0 ? '$' + item.total.toLocaleString() : '未定'"></span>
                            </div>
                            <div class="budget-row">
                                <span class="text-[13px] text-gray-400" x-text="item.subsidyLabel"></span>
                                <span class="text-[14px] font-mono text-gray-200" x-text="item.subsidy > 0 ? '$' + item.subsidy.toLocaleString() : '未定'"></span>
                            </div>
                            <div class="budget-row border-none pb-0">
                                <span class="text-[13px] text-gray-400">地方配合款</span>
                                <span class="text-[14px] font-mono text-gray-200" x-text="item.match > 0 ? '$' + item.match.toLocaleString() : '未定'"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Footer Info (對齊) -->
                    <div class="mt-auto pt-4 border-t border-white/5 flex justify-between items-end">
                        <div>
                            <span class="text-[10px] text-gray-600 font-bold block uppercase tracking-tighter mb-1">負責人員</span>
                            <span class="text-[14px] text-gray-300 font-medium" x-text="item.owner"></span>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-gray-600 font-bold block uppercase tracking-tighter mb-1">核定日期</span>
                            <span class="text-[14px] text-gray-400 font-mono" x-text="item.date"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>
